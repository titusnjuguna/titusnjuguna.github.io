<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Minimal & Modern</title>
    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --bg: #050505;
            --surface: #111111;
            --border: #222222;
            --text-main: #ffffff;
            --text-dim: #999999;
            --accent: #3b82f6; /* Modern Blue */
            --accent-glow: rgba(59, 130, 246, 0.2);
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- UTILITIES --- */
        .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
        .section-label { font-family: var(--font-mono); color: var(--accent); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 2rem; display: block; letter-spacing: 2px; }
        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PROGRESS BAR --- */
        #progress {
            position: fixed; top: 0; left: 0; height: 3px; background: var(--accent);
            z-index: 100; width: 0%; transition: width 0.1s;
        }

        /* --- NAVIGATION --- */
        nav { padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: var(--font-mono); font-weight: 700; color: var(--text-main); text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--text-dim); font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        /* --- HERO --- */
        header { padding: 100px 0; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; letter-spacing: -2px; margin-bottom: 1.5rem; line-height: 1.1; }
        .hero-sub { font-size: 1.2rem; color: var(--text-dim); max-width: 600px; margin-bottom: 2rem; }

        /* --- EXPERIENCE SECTION --- */
        .exp-item { margin-bottom: 2.5rem; display: grid; grid-template-columns: 180px 1fr; }
        .exp-date { font-family: var(--font-mono); color: var(--text-dim); font-size: 0.85rem; }
        .exp-role { font-weight: 600; font-size: 1.1rem; }
        .exp-company { color: var(--accent); font-size: 0.9rem; margin-bottom: 0.5rem; }

        /* --- PROJECT GRID --- */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            transition: 0.3s all;
            text-decoration: none;
            color: inherit;
        }
        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        .project-tags { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); border: 1px solid #333; padding: 2px 8px; border-radius: 4px; }

        /* --- FOOTER / CONTACT --- */
        footer { padding: 100px 0 50px; text-align: center; border-top: 1px solid var(--border); margin-top: 5rem; }
        .contact-email { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-decoration: none; border-bottom: 2px solid var(--accent); }
        .social-links { margin-top: 2rem; display: flex; justify-content: center; gap: 2rem; }
        .social-links a { color: var(--text-dim); text-decoration: none; font-family: var(--font-mono); font-size: 0.9rem; }
        .social-links a:hover { color: var(--text-main); }

        @media (max-width: 600px) {
            .exp-item { grid-template-columns: 1fr; gap: 0.5rem; }
            header { padding: 60px 0; }
        }
    </style>
</head>
<body>

                <li><a href="#experience">Experience</a></li>
                <li><a href="mailto:hello@alexdev.io">Contact</a></li>
            </ul>
        </nav>

            <span class="section-label">Software Engineer</span>
            <h1>I build robust <br>digital architectures.</h1>
